<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FULL CELL STORE v3</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f1117;--bg2:#1a1d27;--bg3:#252836;--bg4:#2e3245;--accent:#00d4aa;--accent2:#0099ff;--warn:#f59e0b;--danger:#ef4444;--success:#10b981;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--border:#2e3245;--r:8px;--r2:12px}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sidebar-header{padding:16px;border-bottom:1px solid var(--border)}
.logo{font-size:13px;font-weight:700;color:var(--accent);letter-spacing:1px}
.logo-sub{font-size:10px;color:var(--text3);margin-top:2px}
.nav{padding:8px 0}
.nav-section{padding:8px 16px 4px;font-size:10px;color:var(--text3);font-weight:600;letter-spacing:1px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 16px;cursor:pointer;color:var(--text2);font-size:13px;border-left:2px solid transparent;transition:.15s}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--bg3);color:var(--accent);border-left-color:var(--accent)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-title{font-size:15px;font-weight:600}
.topbar-right{display:flex;align-items:center;gap:10px}
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-admin{background:rgba(0,212,170,.15);color:var(--accent)}
.badge-promotor{background:rgba(0,153,255,.15);color:var(--accent2)}
.btn-logout{background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:6px 12px;border-radius:var(--r);cursor:pointer;font-size:12px}
.content{flex:1;overflow-y:auto;padding:20px}
.page{display:none}.page.active{display:block}
.login-wrap{display:flex;align-items:center;justify-content:center;height:100vh;background:var(--bg)}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:40px;width:380px}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo .big{font-size:24px;font-weight:700;color:var(--accent);letter-spacing:2px}
.login-logo .sub{font-size:11px;color:var(--text3);margin-top:4px}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px;font-weight:500}
.req{color:var(--danger)}
.form-control{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:var(--r);font-size:13px;outline:none;transition:.15s}
.form-control:focus{border-color:var(--accent)}
.form-control[readonly]{background:var(--bg4);color:var(--accent)}
.form-select{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:var(--r);font-size:13px;outline:none}
.form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:12px;margin-bottom:14px}
.btn{padding:9px 18px;border-radius:var(--r);cursor:pointer;font-size:13px;font-weight:600;border:none;transition:.15s;display:inline-flex;align-items:center;gap:6px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:var(--accent);color:#000}
.btn-secondary{background:var(--bg4);color:var(--text);border:1px solid var(--border)}
.btn-warning{background:var(--warn);color:#000}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-full{width:100%;justify-content:center}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:16px}
.card-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.card-title{font-size:14px;font-weight:600}
.card-body{padding:16px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:12px;margin-bottom:20px}
.kpi-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:16px}
.kpi-label{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.kpi-value{font-size:22px;font-weight:700;line-height:1}
.kpi-sub{font-size:11px;color:var(--text2);margin-top:4px}
.kpi-accent{color:var(--accent)}.kpi-warn{color:var(--warn)}.kpi-danger{color:var(--danger)}.kpi-info{color:var(--accent2)}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:9px 12px;text-align:left;color:var(--text3);font-weight:600;font-size:11px;text-transform:uppercase;background:var(--bg3);border-bottom:1px solid var(--border)}
td{padding:9px 12px;border-bottom:1px solid var(--border);color:var(--text2)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3);color:var(--text)}
.status{padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.s-disponible{background:rgba(16,185,129,.15);color:var(--success)}
.s-vendido{background:rgba(239,68,68,.15);color:var(--danger)}
.s-pendiente{background:rgba(245,158,11,.15);color:var(--warn)}
.s-pagado{background:rgba(0,212,170,.15);color:var(--accent)}
.alert{padding:12px 16px;border-radius:var(--r);margin-bottom:12px;font-size:13px}
.alert-success{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:var(--success)}
.alert-danger{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:var(--danger)}
.alert-warn{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);color:var(--warn)}
.alert-info{background:rgba(0,153,255,.1);border:1px solid rgba(0,153,255,.3);color:var(--accent2)}
.tabs{display:flex;margin-bottom:16px;border-bottom:1px solid var(--border);overflow-x:auto}
.tab{padding:10px 18px;cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;border-bottom:2px solid transparent;white-space:nowrap}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.section-title{font-size:18px;font-weight:700;margin-bottom:4px}
.section-sub{font-size:13px;color:var(--text2);margin-bottom:20px}
.flex{display:flex;align-items:center;gap:8px}
.flex-between{display:flex;align-items:center;justify-content:space-between}
.info-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-top:12px;font-size:12px;color:var(--text2);line-height:1.6}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-overlay{position:fixed;inset:0;background:rgba(15,17,23,.85);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:12px}
.sync-badge{font-size:10px;color:var(--success);display:flex;align-items:center;gap:4px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--success);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.progress-wrap{height:8px;background:var(--bg4);border-radius:4px;overflow:hidden;margin-top:4px}
.progress-bar{height:100%;border-radius:4px;transition:width .5s;background:var(--accent)}
.id-badge{font-family:monospace;font-size:11px;background:var(--bg4);padding:2px 8px;border-radius:4px;color:var(--accent)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:500;padding:16px}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:28px;width:440px;max-width:100%}
.modal-title{font-size:16px;font-weight:700;margin-bottom:20px}
.toggle-switch{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.toggle-switch:last-child{border-bottom:none}
.sw{width:36px;height:20px;border-radius:10px;background:var(--bg4);cursor:pointer;position:relative;transition:.2s;border:1px solid var(--border);flex-shrink:0}
.sw.on{background:var(--accent)}
.sw::after{content:'';position:absolute;width:14px;height:14px;background:#fff;border-radius:50%;top:2px;left:2px;transition:.2s}
.sw.on::after{left:18px}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:14px;margin-bottom:16px}
.filter-bar .form-group{margin-bottom:0;min-width:130px}
.ac-wrap{position:relative}
.ac-list{position:absolute;top:100%;left:0;right:0;background:var(--bg3);border:1px solid var(--accent);border-radius:var(--r);z-index:100;max-height:180px;overflow-y:auto;display:none}
.ac-list.show{display:block}
.ac-item{padding:8px 12px;cursor:pointer;font-size:13px;color:var(--text)}
.ac-item:hover{background:var(--bg4);color:var(--accent)}
.semana-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px}
.semana-card{background:var(--bg3);border-radius:var(--r);padding:10px;border:1px solid var(--border)}
.semana-label{font-size:11px;color:var(--text3);font-weight:600;margin-bottom:6px}
.imei-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)}
.imei-row:last-child{border-bottom:none}
.imei-key{color:var(--text3);font-size:12px}
.imei-val{font-weight:600;font-size:13px}
.text-accent{color:var(--accent)}.text-warn{color:var(--warn)}.text-danger{color:var(--danger)}.text-success{color:var(--success)}
.text-right{text-align:right}
.hidden{display:none!important}
.gap-8{gap:8px}
</style>
</head>
<body>

<div id="loadingOverlay" class="loading-overlay hidden">
  <div class="spinner"></div>
  <div style="color:var(--text2);font-size:13px" id="loadingText">Cargando...</div>
</div>

<div id="modalPass" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-title">Cambiar contrasena</div>
    <div id="modalPassAlert"></div>
    <div class="form-group"><label class="form-label">Contrasena actual</label><input class="form-control" id="mpActual" type="password"></div>
    <div class="form-group"><label class="form-label">Nueva contrasena</label><input class="form-control" id="mpNueva" type="password"></div>
    <div class="form-group"><label class="form-label">Confirmar</label><input class="form-control" id="mpConfirm" type="password"></div>
    <div class="flex gap-8" style="margin-top:16px">
      <button class="btn btn-primary" onclick="confirmarCambioPass()">Actualizar</button>
      <button class="btn btn-secondary" id="btnCerrarPass" onclick="cerrarModalPass()">Cancelar</button>
    </div>
  </div>
</div>

<div id="modalPermisos" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-title">Permisos de <span id="mpNombreUsuario"></span></div>
    <div id="listaPermisos"></div>
    <div style="margin-top:16px"><button class="btn btn-secondary" onclick="document.getElementById('modalPermisos').classList.add('hidden')">Cerrar</button></div>
  </div>
</div>

<div id="loginScreen" class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <div class="big">FULL CELL STORE</div>
      <div class="sub">Sistema de Gestion Comercial v4</div>
    </div>
    <div id="loginAlert"></div>
    <div class="form-group"><label class="form-label">Usuario</label><input class="form-control" id="loginUser" placeholder="Usuario"></div>
    <div class="form-group"><label class="form-label">Contrasena</label><input class="form-control" id="loginPass" type="password" placeholder="********"></div>
    <button class="btn btn-primary btn-full" id="loginBtn" onclick="doLogin()">Ingresar al Sistema</button>
    
  </div>
</div>

<div id="mainApp" class="app hidden">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="logo">FULL CELL STORE</div>
      <div class="logo-sub" id="sidebarRole">v3</div>
    </div>
    <nav class="nav" id="sideNav"></nav>
  </div>
  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="topbarTitle">Dashboard</div>
      <div class="topbar-right">
        <div class="sync-badge"><div class="dot"></div>Sheets</div>
        <button class="btn btn-secondary btn-sm" onclick="abrirModalPass()">Contrasena</button>
        <span id="topbarUser" style="font-size:12px;color:var(--text2)"></span>
        <span id="topbarBadge" class="badge"></span>
        <button class="btn-logout" onclick="doLogout()">Salir</button>
      </div>
    </div>
    <div class="content">
      <div class="page active" id="page-dashboard"></div>
      <div class="page" id="page-ventas"></div>
      <div class="page" id="page-stock"></div>
      <div class="page" id="page-imei"></div>
      <div class="page" id="page-compras"></div>
      <div class="page" id="page-cuentas"></div>
      <div class="page" id="page-proveedores"></div>
      <div class="page" id="page-gastos"></div>
      <div class="page" id="page-cierre"></div>
      <div class="page" id="page-usuarios"></div>
      <div class="page" id="page-catalogo"></div>
      <div class="page" id="page-cuotas"></div>
      <div class="page" id="page-asistencia"></div>
      <div class="page" id="page-auditoria"></div>
      <div class="page" id="page-caja"></div>
    </div>
  </div>
</div>

<script>
var API = 'https://script.google.com/macros/s/AKfycbwSOb7cMiXd74iiBRLt_5Nja1GeQ-ZBIMT_43sOggww2Is7pXxNTBVnFKqSYV_g5ug-/exec';
var currentUser = null;
var listaMaestra = {marcas:[],modelos:[],porMarca:{}};

function apiCall(p, cb) {
  var qs = Object.keys(p).map(function(k){ return k+'='+encodeURIComponent(typeof p[k]==='object'?JSON.stringify(p[k]):p[k]); }).join('&');
  fetch(API+'?'+qs+'&ts='+Date.now())
    .then(function(r){ return r.text(); })
    .then(function(t){ try{ cb(JSON.parse(t)); }catch(e){ cb({ok:false,error:'Parse error'}); } })
    .catch(function(){ cb({ok:false,error:'Sin conexion'}); });
}

function loading(s,m){ document.getElementById('loadingOverlay').classList.toggle('hidden',!s); if(m) document.getElementById('loadingText').textContent=m; }
function setAlert(id,t,m){ var el=document.getElementById(id); if(el) el.innerHTML='<div class="alert alert-'+t+'">'+m+'</div>'; }
function fmt(n){ return 'S/ '+Number(n||0).toLocaleString('es-PE',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtN(n){ return Number(n||0).toLocaleString('es-PE',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function today(){ return new Date().toISOString().split('T')[0]; }
function mesActual(){ return new Date().toISOString().slice(0,7); }
function mayus(v){ return (v||'').toUpperCase().trim(); }
function nextId(arr,prefix){ var ids=arr.map(function(x){ return parseInt((x.id||'').replace(prefix,''))||0; }); return prefix+(Math.max.apply(null,[0].concat(ids))+1).toString().padStart(3,'0'); }
function genVentaId(){ return 'VTA-'+Date.now().toString(36).toUpperCase(); }
function spin(){ return '<div style="padding:40px;text-align:center"><div class="spinner"></div><div style="margin-top:12px;color:var(--text3);font-size:13px">Cargando...</div></div>'; }

function doLogin() {
  var u = document.getElementById('loginUser').value.trim();
  var p = document.getElementById('loginPass').value;
  if (!u||!p) { setAlert('loginAlert','warn','Completa usuario y contrasena'); return; }
  var btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Conectando...';
  setAlert('loginAlert','info','Conectando con Google Sheets...');
  apiCall({accion:'initDB'}, function() {
    apiCall({accion:'login',usuario:u,pass:p}, function(r) {
      btn.disabled = false;
      btn.innerHTML = 'Ingresar al Sistema';
      if (!r.ok) { setAlert('loginAlert','danger', r.error||'Error de conexion'); return; }
      currentUser = r.user;
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('mainApp').classList.remove('hidden');
      apiCall({accion:'getListaMaestra'}, function(lm){ if(lm.ok) listaMaestra=lm; });
      initApp();
      if (r.user.debeCambiarPass) {
        setTimeout(function(){ alert('Tu contrasena tiene '+r.user.diasSinCambio+' dias. Debes actualizarla.'); abrirModalPass(true); }, 800);
      }
    });
  });
}

function doLogout() {
  currentUser = null;
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('mainApp').classList.add('hidden');
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
  document.getElementById('loginAlert').innerHTML = '';
}

function initApp() {
  document.getElementById('topbarUser').textContent = currentUser.nombre;
  document.getElementById('topbarBadge').textContent = currentUser.rol==='admin'?'Admin':'Promotor';
  document.getElementById('topbarBadge').className = 'badge '+(currentUser.rol==='admin'?'badge-admin':'badge-promotor');
  document.getElementById('sidebarRole').textContent = currentUser.rol==='admin'?'ADMINISTRADOR':'PROMOTOR';
  currentUser.esAdminPrincipal = currentUser.nivelAdmin==='1'||currentUser.rol==='admin';
  buildNav();
  showPage('dashboard');
}

function tienePermiso(mod) {
  if (currentUser.rol==='admin') return true;
  return (currentUser.permisosExtra||[]).indexOf(mod) !== -1;
}

var navAdmin = [
  {s:'Principal'},{id:'dashboard',label:'Dashboard'},
  {s:'Operaciones'},{id:'imei',label:'Consulta IMEI'},{id:'ventas',label:'Ventas'},
  {id:'stock',label:'Stock'},{id:'compras',label:'Compras'},
  {s:'Finanzas'},{id:'cuentas',label:'Cuentas'},{id:'proveedores',label:'Proveedores'},
  {id:'gastos',label:'Gastos'},{id:'cierre',label:'Cierre'},
  {s:'Equipo'},{id:'cuotas',label:'Cuotas'},{id:'caja',label:'Mi Caja'},{id:'asistencia',label:'Asistencia'},
  {s:'Catalogo'},{id:'catalogo',label:'Catalogo Precios'},
  {s:'Admin'},{id:'auditoria',label:'Auditoria'},{id:'usuarios',label:'Usuarios'}
];

function buildNav() {
  var isAdmin = currentUser.rol==='admin';
  var extras = currentUser.permisosExtra||[];
  var items = isAdmin ? navAdmin : [
    {s:'Mi Panel'},{id:'dashboard',label:'Mi Dashboard'},{id:'asistencia',label:'Asistencia'},
    {s:'Operaciones'},{id:'imei',label:'IMEI'},{id:'ventas',label:'Venta'},
    {id:'stock',label:'Stock'},{id:'catalogo',label:'Catalogo'},{id:'caja',label:'Caja Diaria'},
    {s:'Mi Meta'},{id:'cuotas',label:'Cuotas'},{id:'caja',label:'Mi Caja'}
  ].concat(extras.indexOf('compras')!==-1?[{s:'Extra'},{id:'compras',label:'Compras'}]:[])
   .concat(extras.indexOf('cuentas')!==-1?[{id:'cuentas',label:'Cuentas'}]:[]);
  var html = '';
  items.forEach(function(n) {
    if (n.s) html += '<div class="nav-section">'+n.s+'</div>';
    else html += '<div class="nav-item" id="nav-'+n.id+'" onclick="showPage(\''+n.id+'\')">'+n.label+'</div>';
  });
  document.getElementById('sideNav').innerHTML = html;
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  document.querySelectorAll('.nav-item').forEach(function(n){ n.classList.remove('active'); });
  var page = document.getElementById('page-'+id);
  if (page) page.classList.add('active');
  var nav = document.getElementById('nav-'+id);
  if (nav) nav.classList.add('active');
  var titles = {dashboard:'Dashboard',stock:'Stock',imei:'Consulta IMEI',ventas:'Ventas',compras:'Compras',cuentas:'Cuentas Bancarias',proveedores:'Proveedores',gastos:'Gastos',cierre:'Cierre Diario',usuarios:'Usuarios',catalogo:'Catalogo',cuotas:'Cuotas',asistencia:'Asistencia'};
  document.getElementById('topbarTitle').textContent = titles[id]||id;
  renderPage(id);
}

function renderPage(id) {
  var fns = {dashboard:renderDashboard,stock:renderStock,imei:renderIMEI,ventas:renderVentas,compras:renderCompras,cuentas:renderCuentas,proveedores:renderProveedores,gastos:renderGastos,cierre:renderCierre,usuarios:renderUsuarios,catalogo:renderCatalogo,cuotas:renderCuotas,asistencia:renderAsistencia};
  if (fns[id]) fns[id]();
}

var passObligatorio = false;
function abrirModalPass(ob) {
  passObligatorio = ob||false;
  document.getElementById('modalPass').classList.remove('hidden');
  document.getElementById('btnCerrarPass').style.display = ob?'none':'';
  ['mpActual','mpNueva','mpConfirm'].forEach(function(i){ document.getElementById(i).value=''; });
  document.getElementById('modalPassAlert').innerHTML='';
}
function cerrarModalPass(){ if(!passObligatorio) document.getElementById('modalPass').classList.add('hidden'); }
function confirmarCambioPass() {
  var actual=document.getElementById('mpActual').value, nueva=document.getElementById('mpNueva').value, conf=document.getElementById('mpConfirm').value;
  if(!actual||!nueva){setAlert('modalPassAlert','warn','Completa todos los campos');return;}
  if(nueva!==conf){setAlert('modalPassAlert','danger','Las contrasenas no coinciden');return;}
  if(nueva.length<6){setAlert('modalPassAlert','warn','Minimo 6 caracteres');return;}
  apiCall({accion:'cambiarPassword',usuario:currentUser.usuario,passActual:actual,nuevaPass:nueva}, function(r){
    if(r.ok){setAlert('modalPassAlert','success','Contrasena actualizada');setTimeout(cerrarModalPass,1500);}

function setupAC(inputId,listId,opciones){
  var input=document.getElementById(inputId), list=document.getElementById(listId);
  if(!input||!list) return;
  input.addEventListener('input',function(){
    var val=input.value.toUpperCase(); input.value=val;
    var f=opciones.filter(function(o){return o.indexOf(val)===0&&o!==val;}).slice(0,10);
    list.innerHTML=f.map(function(o){return '<div class="ac-item" onclick="selAC(\''+inputId+'\',\''+listId+'\',\''+o+'\')">'+o+'</div>';}).join('');
    list.classList.toggle('show',f.length>0&&val.length>0);
  });
  input.addEventListener('blur',function(){setTimeout(function(){list.classList.remove('show');},200);});
}
function selAC(iId,lId,val){ document.getElementById(iId).value=val; document.getElementById(lId).classList.remove('show'); }

  var tipo=document.getElementById('fTipo').value;
  var params={accion:'getVentasFiltradas'};
  if(tipo==='hoy') params.dia=today();
  else if(tipo==='dia') params.dia=(document.getElementById('fFecha')||{}).value||today();
  else if(tipo==='mes') params.mes=(document.getElementById('fMes')||{}).value;
  else if(tipo==='anio') params.anio=(document.getElementById('fAnio')||{}).value;
  else if(tipo==='rango'){params.fechaDesde=(document.getElementById('fDesde')||{}).value;params.fechaHasta=(document.getElementById('fHasta')||{}).value;}
  var asesor=document.getElementById('fAsesor')&&document.getElementById('fAsesor').value; if(asesor) params.asesor=asesor;
  if(currentUser.rol!=='admin') params.asesor=currentUser.nombre;
  document.getElementById('tablaVentasFiltradas').innerHTML=spin();
  apiCall(params, function(r){
    if(!r.ok){document.getElementById('tablaVentasFiltradas').innerHTML='<div class="alert alert-danger">'+r.error+'</div>';return;}
    var resumen=r.resumen||{};
    document.getElementById('resumenFiltro').innerHTML='<div class="kpi-grid" style="margin-bottom:12px"><div class="kpi-card"><div class="kpi-label">Total ventas</div><div class="kpi-value kpi-accent">'+fmt(resumen.totalVentas)+'</div><div class="kpi-sub">'+resumen.total+' venta(s)</div></div><div class="kpi-card"><div class="kpi-label">Utilidad</div><div class="kpi-value kpi-accent">'+fmt(resumen.utilidad)+'</div></div><div class="kpi-card"><div class="kpi-label">Equipos</div><div class="kpi-value">'+resumen.equipos+'</div></div><div class="kpi-card"><div class="kpi-label">Accesorios</div><div class="kpi-value">'+resumen.accesorios+'</div></div></div>';
    document.getElementById('tablaVentasFiltradas').innerHTML=tablaVentas(r.data||[],'Resultados ('+((r.data||[]).length)+')',currentUser.rol==='admin');
  });
}
function resetFiltros(){ document.getElementById('fTipo').value='hoy'; actualizarFiltroFecha(); document.getElementById('resumenFiltro').innerHTML=''; aplicarFiltros(); }

function cargarDatosIMEI(){
  var imei=document.getElementById('vImei').value.trim();

    var eq=(res.data||[]).find(function(s){return s.imei===imei;});

function registrarVenta(){

    apiCall({accion:'saveRecord',hoja:'ventas',data:venta}, function(){
      apiCall({accion:'updateRecord',hoja:'stock',id:eq.id,field:'estado',value:'Vendido'}, function(){
        apiCall({accion:'updateCuenta',cuenta:banco,monto:pv,operacion:'suma'}, function(){
          apiCall({accion:'getData',hoja:'movimientos'}, function(mRes){
            var movs=mRes.data||[];
            apiCall({accion:'saveRecord',hoja:'movimientos',data:{id:nextId(movs,'M'),fecha:today(),cuenta:banco,tipo:'Venta',monto:pv,ref:idVenta,resp:venta.asesor,obs:eq.marca+' '+eq.modelo+' - '+nombre}}, function(){

              imeiActual=null; document.getElementById('vDatosEquipo').classList.add('hidden'); document.getElementById('vImei').value='';

function swCuentas(t){
  ['Ing','Mov','Nueva'].forEach(function(x){

function swGastos(t){
  var map={gf:'GF',gd:'GD',cat:'Cat'};
  Object.keys(map).forEach(function(k){
    var btn=document.getElementById('tabG'+map[k].charAt(0)+map[k].slice(1)+'Btn')||document.getElementById('tab'+map[k]+'Btn');
    var div=document.getElementById('tabG'+k.charAt(0).toUpperCase()+k.slice(1))||document.getElementById('tab'+map[k]);
    if(btn) btn.classList.toggle('active',k===t);
    if(div) div.classList.toggle('hidden',k!==t);
  });
  // Simpler approach
  ['GF','GD','Cat'].forEach(function(x,i){
    var keys=['gf','gd','cat'];
    var b=document.getElementById('tabG'+x+'Btn'), d=document.getElementById('tabG'+keys[i]);
    if(b) b.classList.toggle('active',keys[i]===t);
    if(d) d.classList.toggle('hidden',keys[i]!==t);
  });
}

function renderCuotas(){
  var page=document.getElementById('page-cuotas');
  var isAdmin=currentUser.rol==='admin';
  page.innerHTML=spin();
  apiCall({accion:'getAvanceCuotas',mes:mesActual()}, function(avRes){
    apiCall({accion:'getData',hoja:'usuarios'}, function(uRes){
      var avances=avRes.data||[];
      var promotores=(uRes.data||[]).filter(function(u){return u.rol==='promotor';});
      var tarjetas=avances.map(function(a){
        var pE=Math.min(a.pctEquipos||0,100), pA=Math.min(a.pctAccesorios||0,100);
        var colE=pE>=100?'var(--success)':pE>=70?'var(--warn)':'var(--accent2)';
        var colA=pA>=100?'var(--success)':pA>=70?'var(--warn)':'var(--accent2)';
        var semHtml=(a.semanas||[]).map(function(s){return '<div class="semana-card"><div class="semana-label">'+s.semana+'</div><div style="margin-bottom:6px"><div class="flex-between"><span style="font-size:11px;color:var(--text2)">Equipos '+(s.avanceEquipos||0)+'/'+(s.cuotaEquipos||0)+'</span><span style="font-size:10px">'+(s.pctEquipos||0)+'%</span></div><div class="progress-wrap"><div class="progress-bar" style="width:'+Math.min(s.pctEquipos||0,100)+'%;background:var(--accent2)"></div></div></div><div><div class="flex-between"><span style="font-size:11px;color:var(--text2)">Accesorios '+(s.avanceAccesorios||0)+'/'+(s.cuotaAccesorios||0)+'</span><span style="font-size:10px">'+(s.pctAccesorios||0)+'%</span></div><div class="progress-wrap"><div class="progress-bar" style="width:'+Math.min(s.pctAccesorios||0,100)+'%;background:var(--accent)"></div></div></div></div>';}).join('');
        return '<div class="card"><div class="card-header"><span class="card-title">'+a.asesor+'</span><span style="font-size:11px;color:var(--text3)">'+mesActual()+'</span></div><div class="card-body">'+
        '<div style="margin-bottom:14px"><div class="flex-between" style="margin-bottom:4px"><span style="font-size:12px;color:var(--text2)">Equipos mes</span><span style="font-size:13px;font-weight:600;color:'+colE+'">'+a.avanceEquipos+'/'+a.cuotaEquipos+' ('+pE+'%)</span></div><div class="progress-wrap"><div class="progress-bar" style="width:'+pE+'%;background:'+colE+'"></div></div></div>'+
        '<div style="margin-bottom:14px"><div class="flex-between" style="margin-bottom:4px"><span style="font-size:12px;color:var(--text2)">Accesorios mes</span><span style="font-size:13px;font-weight:600;color:'+colA+'">'+a.avanceAccesorios+'/'+a.cuotaAccesorios+' ('+pA+'%)</span></div><div class="progress-wrap"><div class="progress-bar" style="width:'+pA+'%;background:'+colA+'"></div></div></div>'+
        '<div class="flex-between" style="background:var(--bg3);border-radius:var(--r);padding:8px 12px;margin-bottom:12px"><span style="font-size:12px;color:var(--text2)">Ventas en soles</span><span style="font-weight:600;color:var(--accent)">'+fmt(a.avanceSoles)+'</span></div>'+
        (semHtml?'<div style="font-size:11px;color:var(--text3);font-weight:600;margin-bottom:6px">DETALLE SEMANAL</div><div class="semana-grid">'+semHtml+'</div>':'')+
        '</div></div>';
      }).join('');
      page.innerHTML='<div class="section-title">Cuotas de Ventas</div><div class="section-sub">Seguimiento semanal y mensual - '+mesActual()+'</div>'+
      (isAdmin?'<div class="card"><div class="card-header"><span class="card-title">Asignar cuota</span></div><div class="card-body">'+
      '<div class="form-row"><div class="form-group"><label class="form-label">Asesor</label><select class="form-select" id="qAsesor">'+promotores.map(function(u){return '<option>'+u.nombre+'</option>';}).join('')+'</select></div>'+
      '<div class="form-group"><label class="form-label">Mes (YYYY-MM)</label><input class="form-control" id="qMes" value="'+mesActual()+'"></div>'+
      '<div class="form-group"><label class="form-label">Semana (vacio=mensual)</label><select class="form-select" id="qSemana"><option value="">Mensual</option><option>S1</option><option>S2</option><option>S3</option><option>S4</option></select></div></div>'+
      '<div class="form-row"><div class="form-group"><label class="form-label">Cuota equipos</label><input class="form-control" id="qEquipos" type="number"></div>'+
      '<div class="form-group"><label class="form-label">Cuota accesorios</label><input class="form-control" id="qAccesorios" type="number"></div>'+
      '<div class="form-group"><label class="form-label">Cuota en soles</label><input class="form-control" id="qSoles" type="number"></div></div>'+
      '<div id="cuotaAlert"></div><button class="btn btn-primary" id="btnCuota" onclick="guardarCuota()">Guardar cuota</button>'+
      '</div></div>':'')+'<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px">'+(tarjetas||'<div class="card"><div class="card-body" style="color:var(--text3);text-align:center;padding:32px">Sin cuotas asignadas.</div></div>')+'</div>';
    });
  });
}

function guardarCuota(){
  var asesor=document.getElementById('qAsesor').value, mes=document.getElementById('qMes').value, semana=document.getElementById('qSemana').value, equipos=document.getElementById('qEquipos').value, accesorios=document.getElementById('qAccesorios').value, soles=document.getElementById('qSoles').value;
  if(!asesor||!mes||!equipos||!accesorios){setAlert('cuotaAlert','warn','Completa asesor, mes, equipos y accesorios');return;}
  var btn=document.getElementById('btnCuota'); btn.disabled=true; btn.innerHTML='<span class="spinner"></span>';
  apiCall({accion:'getData',hoja:'cuotas'}, function(res){
    var cuotas=res.data||[];
    var existe=cuotas.find(function(c){return c.asesor===asesor&&c.mes===mes&&(c.semana||'')===(semana||'');});
    if(existe){
      apiCall({accion:'updateRecord',hoja:'cuotas',id:existe.id,field:'cuotaEquipos',value:equipos}, function(){
        apiCall({accion:'updateRecord',hoja:'cuotas',id:existe.id,field:'cuotaAccesorios',value:accesorios}, function(){
          btn.disabled=false; btn.innerHTML='Guardar cuota';
          setAlert('cuotaAlert','success','Cuota actualizada'); setTimeout(renderCuotas,1500);
        });
      });
    } else {
      apiCall({accion:'saveRecord',hoja:'cuotas',data:{id:nextId(cuotas,'Q'),asesor:asesor,mes:mes,semana:semana||'',cuotaEquipos:equipos,cuotaAccesorios:accesorios,cuotaSoles:soles||0,estado:'Activo',obs:''}}, function(){
        btn.disabled=false; btn.innerHTML='Guardar cuota';
        setAlert('cuotaAlert','success','Cuota guardada'); setTimeout(renderCuotas,1500);
      });
    }
  });
}

function renderAsistencia(){
  var page=document.getElementById('page-asistencia');
  var isAdmin=currentUser.rol==='admin';
  page.innerHTML=spin();
  apiCall({accion:'getData',hoja:'asistencia'}, function(res){
    var asistencia=res.data||[];
    var hoyReg=asistencia.filter(function(a){return a.fecha===today()&&a.asesor===currentUser.nombre;});
    var yaEntrada=hoyReg.find(function(a){return a.tipo==='Entrada';});
    var ahora=new Date().toLocaleTimeString('es-PE',{hour:'2-digit',minute:'2-digit',hour12:false});
    var miRegistro=isAdmin?'':'<div class="card"><div class="card-header"><span class="card-title">Mi asistencia de hoy</span></div><div class="card-body">'+
    '<div style="text-align:center;margin-bottom:16px"><div style="font-size:28px;font-weight:700;color:var(--accent)">'+ahora+'</div><div style="font-size:12px;color:var(--text3)">'+today()+' - hora del sistema</div></div>'+
    (yaEntrada?'<div class="alert alert-success">Entrada registrada a las <strong>'+yaEntrada.hora+'</strong></div><button class="btn btn-secondary btn-full" onclick="registrarAsist(\'Salida\')">Registrar Salida</button>':
    '<div class="form-row"><div class="form-group"><label class="form-label">Tipo</label><select class="form-select" id="asTipo"><option>Entrada</option><option>Tardanza</option><option>Falta</option></select></div>'+
    '<div class="form-group"><label class="form-label">Motivo</label><input class="form-control" id="asMotivo" placeholder="Ej: Trafico..."></div></div>'+
    '<div id="asAlert"></div><button class="btn btn-primary btn-full" onclick="registrarAsist()">Registrar asistencia</button>')+
    '</div></div>';
    var mes=mesActual();
    var asMes=asistencia.filter(function(a){return a.fecha.startsWith(mes);});
    var resumenAdmin='';
    if(isAdmin){
      var proms=[]; asMes.forEach(function(a){if(proms.indexOf(a.asesor)===-1)proms.push(a.asesor);});
      resumenAdmin='<div class="kpi-grid">'+proms.map(function(p){var pa=asMes.filter(function(a){return a.asesor===p;});return '<div class="kpi-card"><div class="kpi-label">'+p+'</div><div style="font-size:12px;margin-top:6px"><span style="color:var(--success)">Entradas: '+pa.filter(function(a){return a.tipo==='Entrada';}).length+'</span><br><span style="color:var(--warn)">Tardanzas: '+pa.filter(function(a){return a.tipo==='Tardanza';}).length+'</span><br><span style="color:var(--danger)">Faltas: '+pa.filter(function(a){return a.tipo==='Falta';}).length+'</span></div></div>';}).join('')+'</div>';
    }
    var todos=isAdmin?asistencia:asistencia.filter(function(a){return a.asesor===currentUser.nombre;});
    var filas=todos.slice(-50).reverse().map(function(a){return '<tr><td>'+a.fecha+'</td><td>'+a.asesor+'</td><td>'+a.hora+'</td><td><span class="status '+(a.tipo==='Entrada'||a.tipo==='Salida'?'s-disponible':a.tipo==='Tardanza'?'s-pendiente':'s-vendido')+'">'+a.tipo+'</span></td><td>'+(a.motivo||'')+'</td></tr>';}).join('');
    page.innerHTML='<div class="section-title">Asistencia</div><div class="section-sub">'+(isAdmin?'Registro del equipo - '+mes:'Mi asistencia')+'</div>'+
    miRegistro+resumenAdmin+
    '<div class="card"><div class="card-header"><span class="card-title">Historial</span></div><div class="card-body"><div class="table-wrap"><table><thead><tr><th>Fecha</th><th>Asesor</th><th>Hora</th><th>Tipo</th><th>Motivo</th></tr></thead><tbody>'+(filas||'<tr><td colspan="5" style="text-align:center;color:var(--text3);padding:24px">Sin registros</td></tr>')+'</tbody></table></div></div></div>';
  });
}

function registrarAsist(tf){
  var tipo=tf||(document.getElementById('asTipo')&&document.getElementById('asTipo').value)||'Entrada';
  var motivo=(document.getElementById('asMotivo')&&document.getElementById('asMotivo').value)||'';
  loading(true,'Registrando...');
  apiCall({accion:'registrarAsistencia',asesor:currentUser.nombre,tipo:tipo,motivo:motivo}, function(r){
    loading(false);
    if(r.ok) renderAsistencia();
    else setAlert('asAlert','danger',r.error||'Error');
  });
}

function exportarCSV(){
  loading(true,'Generando reporte...');
  apiCall({accion:'getData',hoja:'ventas'}, function(vRes){
    apiCall({accion:'getData',hoja:'stock'}, function(sRes){
      loading(false);
      var ventas=vRes.data||[], stock=sRes.data||[];
      var csv='REPORTE FULL CELL STORE v3 - '+today()+'\n\nVENTAS\nID Venta,Fecha,Marca,Modelo,IMEI,DNI,Cliente,Costo,P.Venta,Utilidad,Asesor,Banco,Stock\n';
      ventas.forEach(function(v){csv+=[(v.idVenta||v.id),v.fecha,v.marca,v.modelo,v.imei,(v.dniCliente||''),(v.nombreCliente||''),v.precioCompra,v.precioVenta,v.utilidad,v.asesor,v.banco,v.tipoStock].join(',')+'\n';});
      csv+='\nSTOCK\nID,Estado,Marca,Modelo,IMEI,Color,Costo,P.Venta,Tipo,Proveedor\n';
      stock.forEach(function(s){csv+=[s.id,s.estado,s.marca,s.modelo,s.imei,s.color,s.precioCompra,s.precioVenta,s.tipoStock,s.proveedor].join(',')+'\n';});
      var blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
      var url=URL.createObjectURL(blob); var a=document.createElement('a'); a.href=url; a.download='REPORTE_FULL CELL STORE_'+today()+'.csv'; a.click(); URL.revokeObjectURL(url);
    });
  });
}

// ── RENDER CAJA DIARIA ────────────────────────────────────
function renderCaja(){
  var page=document.getElementById('page-caja');
  var isAdmin=currentUser.rol==='admin';
  page.innerHTML=spin();
  apiCall({accion:'getData',hoja:'cajaDiaria'},function(res){
    apiCall({accion:'getCuentas'},function(cRes){
      var cajas=res.data||[];
      var cuentasLista=Object.keys(cRes.data||{});
      var optC=cuentasLista.map(function(c){return '<option>'+c+'</option>';}).join('');
      var hoy=today();
      var cajasHoy=cajas.filter(function(c){return c.fecha===hoy;});
      var miCajaHoy=cajasHoy.find(function(c){return c.promotor===currentUser.nombre;});
      var totalEfectivo=cajasHoy.reduce(function(a,c){return a+parseFloat(c.montoEfectivo||0);},0);
      var totalBanco=cajasHoy.reduce(function(a,c){return a+parseFloat(c.montoBanco||0);},0);
      var miForm=!isAdmin?'<div class="card"><div class="card-header"><span class="card-title">Mi Caja de Hoy - '+hoy+'</span></div><div class="card-body">'+
      (miCajaHoy?'<div class="alert alert-success">Caja registrada hoy - Efectivo: '+fmt(miCajaHoy.montoEfectivo)+' | Banco: '+fmt(miCajaHoy.montoBanco)+'</div>':'')+
      '<div class="form-row"><div class="form-group"><label class="form-label">Monto efectivo recibido (S/)</label><input class="form-control" id="cajaEfectivo" type="number" placeholder="0.00" value="'+(miCajaHoy?miCajaHoy.montoEfectivo:'')+'"></div>'+
      '<div class="form-group"><label class="form-label">Monto via banco/digital (S/)</label><input class="form-control" id="cajaBanco" type="number" placeholder="0.00" value="'+(miCajaHoy?miCajaHoy.montoBanco:'')+'"></div>'+
      '<div class="form-group"><label class="form-label">Entidad bancaria</label><select class="form-select" id="cajaCuenta">'+optC+'</select></div></div>'+
      '<div class="form-group"><label class="form-label">Observacion</label><input class="form-control" id="cajaObs"></div>'+
      '<div id="cajaAlert"></div>'+
      '<button class="btn btn-primary" onclick="guardarCaja()">Registrar mi caja</button>'+
      '</div></div>':'';
      var filasHoy=cajasHoy.map(function(c){return '<tr><td>'+c.promotor+'</td><td class="text-right text-accent">'+fmt(c.montoEfectivo)+'</td><td class="text-right text-accent">'+fmt(c.montoBanco)+'</td><td>'+c.banco+'</td><td>'+c.obs+'</td></tr>';}).join('');
      page.innerHTML=miForm+
      (isAdmin?'<div class="kpi-grid"><div class="kpi-card green"><div class="kpi-label">Efectivo total hoy</div><div class="kpi-value kpi-green">'+fmt(totalEfectivo)+'</div></div><div class="kpi-card"><div class="kpi-label">Banco/Digital hoy</div><div class="kpi-value kpi-accent">'+fmt(totalBanco)+'</div></div><div class="kpi-card"><div class="kpi-label">Total recaudado hoy</div><div class="kpi-value kpi-accent">'+fmt(totalEfectivo+totalBanco)+'</div></div></div>':'')+
      '<div class="card"><div class="card-header"><span class="card-title">Cajas registradas hoy - '+hoy+'</span></div>'+
      '<div class="card-body"><div class="table-wrap"><table><thead><tr><th>Promotor</th><th>Efectivo</th><th>Banco/Digital</th><th>Entidad</th><th>Observacion</th></tr></thead>'+
      '<tbody>'+(filasHoy||'<tr><td colspan="5" style="text-align:center;color:var(--text3);padding:24px">Sin registros de caja hoy</td></tr>')+'</tbody></table></div></div></div>'+
      '<div class="card"><div class="card-header"><span class="card-title">Historico de cajas (ultimos 30 dias)</span></div>'+
      '<div class="card-body"><div class="table-wrap"><table><thead><tr><th>Fecha</th><th>Promotor</th><th>Efectivo</th><th>Banco</th><th>Entidad</th></tr></thead>'+
      '<tbody>'+cajas.slice(-30).reverse().map(function(c){return '<tr><td>'+c.fecha+'</td><td>'+c.promotor+'</td><td class="text-right">'+fmt(c.montoEfectivo)+'</td><td class="text-right">'+fmt(c.montoBanco)+'</td><td>'+c.banco+'</td></tr>';}).join('')+'</tbody></table></div></div></div>';
    });
  });
}

function guardarCaja(){
  var efectivo=parseFloat(document.getElementById('cajaEfectivo').value)||0;
  var banco=parseFloat(document.getElementById('cajaBanco').value)||0;
  var cuenta=document.getElementById('cajaCuenta').value;
  var obs=document.getElementById('cajaObs').value;
  apiCall({accion:'registrarCajaDiaria',promotor:currentUser.nombre,usuarioId:currentUser.id,montoEfectivo:efectivo,montoBanco:banco,banco:cuenta,obs:obs},function(r){
    if(r.ok){setAlert('cajaAlert','success','Caja registrada correctamente');setTimeout(renderCaja,1500);}
    else setAlert('cajaAlert','danger',r.error||'Error al registrar caja');
  });
}
