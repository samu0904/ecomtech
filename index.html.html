<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DASHBOARD ECOMTECH v2</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f1117;--bg2:#1a1d27;--bg3:#252836;--bg4:#2e3245;--accent:#00d4aa;--accent2:#0099ff;--warn:#f59e0b;--danger:#ef4444;--success:#10b981;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--border:#2e3245;--r:8px;--r2:12px}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sidebar-header{padding:16px;border-bottom:1px solid var(--border);flex-shrink:0}
.logo{font-size:13px;font-weight:700;color:var(--accent);letter-spacing:1px}
.logo-sub{font-size:10px;color:var(--text3);margin-top:2px}
.nav{padding:8px 0}
.nav-section{padding:8px 16px 4px;font-size:10px;color:var(--text3);font-weight:600;letter-spacing:1px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 16px;cursor:pointer;color:var(--text2);font-size:13px;border-left:2px solid transparent;transition:.15s}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--bg3);color:var(--accent);border-left-color:var(--accent)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-title{font-size:15px;font-weight:600}
.topbar-right{display:flex;align-items:center;gap:12px}
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-admin{background:rgba(0,212,170,.15);color:var(--accent)}
.badge-promotor{background:rgba(0,153,255,.15);color:var(--accent2)}
.btn-logout{background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:6px 12px;border-radius:var(--r);cursor:pointer;font-size:12px}
.btn-logout:hover{color:var(--danger);border-color:var(--danger)}
.content{flex:1;overflow-y:auto;padding:20px}
.page{display:none}.page.active{display:block}
.login-wrap{display:flex;align-items:center;justify-content:center;height:100vh;background:var(--bg)}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:40px;width:380px}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo .big{font-size:24px;font-weight:700;color:var(--accent);letter-spacing:2px}
.login-logo .sub{font-size:11px;color:var(--text3);margin-top:4px}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px;font-weight:500}
.form-label .req{color:var(--danger)}
.form-control{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:var(--r);font-size:13px;outline:none;transition:.15s}
.form-control:focus{border-color:var(--accent)}
.form-control[readonly]{background:var(--bg4);color:var(--accent)}
.form-control.error{border-color:var(--danger)}
.form-select{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:var(--r);font-size:13px;outline:none}
.btn{padding:9px 18px;border-radius:var(--r);cursor:pointer;font-size:13px;font-weight:600;border:none;transition:.15s;display:inline-flex;align-items:center;gap:6px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:var(--accent);color:#000}.btn-primary:hover{background:#00bfa0}
.btn-secondary{background:var(--bg4);color:var(--text);border:1px solid var(--border)}.btn-secondary:hover{background:var(--bg3)}
.btn-danger{background:var(--danger);color:#fff}
.btn-warning{background:var(--warn);color:#000}
.btn-success{background:var(--success);color:#000}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-full{width:100%;justify-content:center}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
.kpi-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:16px}
.kpi-label{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.kpi-value{font-size:22px;font-weight:700;line-height:1}
.kpi-sub{font-size:11px;color:var(--text2);margin-top:4px}
.kpi-accent{color:var(--accent)}.kpi-warn{color:var(--warn)}.kpi-danger{color:var(--danger)}.kpi-info{color:var(--accent2)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:16px}
.card-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:14px;font-weight:600}
.card-body{padding:16px}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:9px 12px;text-align:left;color:var(--text3);font-weight:600;font-size:11px;text-transform:uppercase;background:var(--bg3);border-bottom:1px solid var(--border)}
td{padding:9px 12px;border-bottom:1px solid var(--border);color:var(--text2)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3);color:var(--text)}
.status{padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.s-disponible{background:rgba(16,185,129,.15);color:var(--success)}
.s-vendido{background:rgba(239,68,68,.15);color:var(--danger)}
.s-pendiente{background:rgba(245,158,11,.15);color:var(--warn)}
.s-pagado{background:rgba(0,212,170,.15);color:var(--accent)}
.form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:14px}
.alert{padding:12px 16px;border-radius:var(--r);margin-bottom:12px;font-size:13px}
.alert-success{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:var(--success)}
.alert-danger{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:var(--danger)}
.alert-warn{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);color:var(--warn)}
.alert-info{background:rgba(0,153,255,.1);border:1px solid rgba(0,153,255,.3);color:var(--accent2)}
.imei-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:24px;max-width:540px;margin:0 auto}
.imei-result{margin-top:16px;padding:16px;background:var(--bg3);border-radius:var(--r);border:1px solid var(--border)}
.imei-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)}
.imei-row:last-child{border-bottom:none}
.imei-key{color:var(--text3);font-size:12px}
.imei-val{font-weight:600;font-size:13px}
.tabs{display:flex;margin-bottom:16px;border-bottom:1px solid var(--border)}
.tab{padding:10px 20px;cursor:pointer;color:var(--text2);font-size:13px;font-weight:500;border-bottom:2px solid transparent;transition:.15s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.section-title{font-size:18px;font-weight:700;margin-bottom:4px}
.section-sub{font-size:13px;color:var(--text2);margin-bottom:20px}
.flex{display:flex;align-items:center;gap:8px}
.flex-between{display:flex;align-items:center;justify-content:space-between}
.info-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-top:12px;font-size:12px;color:var(--text2);line-height:1.6}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-overlay{position:fixed;inset:0;background:rgba(15,17,23,.85);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:12px}
.sync-badge{font-size:10px;color:var(--success);display:flex;align-items:center;gap:4px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--success);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.progress-wrap{height:8px;background:var(--bg4);border-radius:4px;overflow:hidden;margin-top:4px}
.progress-bar{height:100%;border-radius:4px;transition:width .5s;background:var(--accent)}
.progress-warn{background:var(--warn)}
.progress-danger{background:var(--danger)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:500}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:28px;width:420px;max-width:95vw}
.modal-title{font-size:16px;font-weight:700;margin-bottom:20px}
.id-badge{font-family:monospace;font-size:11px;background:var(--bg4);padding:2px 8px;border-radius:4px;color:var(--accent)}
.text-accent{color:var(--accent)}.text-warn{color:var(--warn)}.text-danger{color:var(--danger)}.text-success{color:var(--success)}
.text-right{text-align:right}
.hidden{display:none!important}
.gap-8{gap:8px}.mt-8{margin-top:8px}.mt-16{margin-top:16px}

.filter-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:14px;margin-bottom:16px}
.filter-bar .form-group{margin-bottom:0;min-width:130px}
.filter-bar .form-label{font-size:11px}
.ac-wrap{position:relative}
.ac-list{position:absolute;top:100%;left:0;right:0;background:var(--bg3);border:1px solid var(--accent);border-radius:var(--r);z-index:100;max-height:180px;overflow-y:auto;display:none}
.ac-list.show{display:block}
.ac-item{padding:8px 12px;cursor:pointer;font-size:13px;color:var(--text)}
.ac-item:hover{background:var(--bg4);color:var(--accent)}
.semana-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px}
.semana-card{background:var(--bg3);border-radius:var(--r);padding:10px;border:1px solid var(--border)}
.semana-label{font-size:11px;color:var(--text3);font-weight:600;margin-bottom:6px}
.toggle-switch{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.toggle-switch:last-child{border-bottom:none}
.sw{width:36px;height:20px;border-radius:10px;background:var(--bg4);cursor:pointer;position:relative;transition:.2s;border:1px solid var(--border);flex-shrink:0}
.sw.on{background:var(--accent)}
.sw::after{content:'';position:absolute;width:14px;height:14px;background:#fff;border-radius:50%;top:2px;left:2px;transition:.2s}
.sw.on::after{left:18px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:500;padding:16px}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:28px;width:440px;max-width:100%}
.modal-title{font-size:16px;font-weight:700;margin-bottom:20px}
</style>
</head>
<body>

<div id="loadingOverlay" class="loading-overlay hidden">
  <div class="spinner"></div>
  <div style="color:var(--text2);font-size:13px" id="loadingText">Conectando...</div>
</div>

<!-- MODAL CAMBIO DE CONTRASEÑA -->
<div id="modalPass" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-title">🔒 Cambiar contraseña</div>
    <div id="modalPassAlert"></div>
    <div class="form-group"><label class="form-label">Contraseña actual</label><input class="form-control" id="mpPassActual" type="password"></div>
    <div class="form-group"><label class="form-label">Nueva contraseña</label><input class="form-control" id="mpPassNueva" type="password"></div>
    <div class="form-group"><label class="form-label">Confirmar nueva contraseña</label><input class="form-control" id="mpPassConfirm" type="password"></div>
    <div class="flex gap-8" style="margin-top:16px">
      <button class="btn btn-primary" id="btnCambiarPass" onclick="confirmarCambioPass()">Actualizar contraseña</button>
      <button class="btn btn-secondary" onclick="cerrarModalPass()" id="btnCerrarPass">Cancelar</button>
    </div>
  </div>
</div>

<div id="loginScreen" class="login-wrap">
<div class="login-card">
  <div class="login-logo">
    <div class="big">ECOMTECH</div>
    <div class="sub">SISTEMA DE GESTIÓN v3 — GOOGLE SHEETS</div>
  </div>
  <div id="loginAlert"></div>
  <div class="form-group"><label class="form-label">Usuario</label><input class="form-control" id="loginUser" placeholder="Ingresa tu usuario"></div>
  <div class="form-group"><label class="form-label">Contraseña</label><input class="form-control" id="loginPass" type="password" placeholder="••••••••"></div>
  <button class="btn btn-primary btn-full" id="loginBtn" onclick="doLogin()">Ingresar al Sistema</button>
  <div class="info-box">admin / admin123 &nbsp;|&nbsp; luis / luis123 &nbsp;|&nbsp; marleni / mar123</div>
</div>
</div>

<div id="mainApp" class="app hidden">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="logo">⚡ ECOMTECH</div>
      <div class="logo-sub" id="sidebarRole">DASHBOARD</div>
    </div>
    <nav class="nav" id="sideNav"></nav>
  </div>
  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="topbarTitle">Dashboard</div>
      <div class="topbar-right">
        <div class="sync-badge"><div class="dot"></div>Google Sheets</div>
        <button class="btn btn-secondary btn-sm" onclick="abrirModalPass()" style="font-size:11px">🔒 Contraseña</button>
        <span id="topbarUser" style="font-size:12px;color:var(--text2)"></span>
        <span id="topbarBadge" class="badge"></span>
        <button class="btn-logout" onclick="doLogout()">Salir</button>
      </div>
    </div>
    <div class="content">
      <div class="page active" id="page-dashboard"></div>
      <div class="page" id="page-stock"></div>
      <div class="page" id="page-imei"></div>
      <div class="page" id="page-ventas"></div>
      <div class="page" id="page-compras"></div>
      <div class="page" id="page-cuentas"></div>
      <div class="page" id="page-proveedores"></div>
      <div class="page" id="page-gastos"></div>
      <div class="page" id="page-cierre"></div>
      <div class="page" id="page-usuarios"></div>
      <div class="page" id="page-catalogo"></div>
      <div class="page" id="page-cuotas"></div>
      <div class="page" id="page-asistencia"></div>
    </div>
  </div>
</div>

<script>
const API='https://script.google.com/macros/s/AKfycbwSOb7cMiXd74iiBRLt_5Nja1GeQ-ZBIMT_43sOggww2Is7pXxNTBVnFKqSYV_g5ug-/exec';
let currentUser=null;

async function api(params){
  try{
    const qs=Object.entries(params).map(([k,v])=>k+'='+encodeURIComponent(typeof v==='object'?JSON.stringify(v):v)).join('&');
    const res=await fetch(API+'?'+qs+'&ts='+Date.now());
    return JSON.parse(await res.text());
  }catch(e){
    try{
      const res=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(params)});
      return JSON.parse(await res.text());
    }catch(e2){return{ok:false,error:'Sin conexión'};}
  }
}

function loading(show,msg){document.getElementById('loadingOverlay').classList.toggle('hidden',!show);if(msg)document.getElementById('loadingText').textContent=msg;}
function setAlert(id,type,msg){const el=document.getElementById(id);if(el)el.innerHTML=`<div class="alert alert-${type}">${msg}</div>`;}
function fmt(n){return'S/ '+Number(n||0).toLocaleString('es-PE',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtN(n){return Number(n||0).toLocaleString('es-PE',{minimumFractionDigits:2,maximumFractionDigits:2});}
function today(){return new Date().toISOString().split('T')[0];}
function mayus(v){return(v||'').toUpperCase().trim();}
function mesActual(){return new Date().toISOString().slice(0,7);}
function nextId(arr,prefix){const ids=arr.map(x=>parseInt((x.id||'').replace(prefix,''))||0);return prefix+(Math.max(0,...ids)+1).toString().padStart(3,'0');}
function genVentaId(){return'VTA-'+Date.now().toString(36).toUpperCase();}
function spin(){return'<div style="padding:40px;text-align:center"><div class="spinner"></div><div style="margin-top:12px;color:var(--text3);font-size:13px">Cargando desde Google Sheets...</div></div>';}

// ── LOGIN ─────────────────────────────────────────────────
async function doLogin(){
  const u=document.getElementById('loginUser').value.trim();
  const p=document.getElementById('loginPass').value;
  if(!u||!p){setAlert('loginAlert','warn','Completa usuario y contraseña');return;}
  const btn=document.getElementById('loginBtn');
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Conectando...';
  setAlert('loginAlert','info','Conectando con Google Sheets...');
  await api({accion:'initDB'});
  const result=await api({accion:'login',usuario:u,pass:p});
  btn.disabled=false;btn.innerHTML='Ingresar al Sistema';
  if(!result.ok){setAlert('loginAlert','danger',result.error||'Error de conexión');return;}
  currentUser=result.user;
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('mainApp').classList.remove('hidden');
  // Cargar lista maestra
  api({accion:'getListaMaestra'}).then(lm=>{if(lm.ok)listaMaestra=lm;});
  initApp();
  if(result.user.debeCambiarPass){
    setTimeout(()=>{
      alert('⚠️ Tu contraseña tiene '+result.user.diasSinCambio+' días sin actualizarse. Por seguridad debes cambiarla ahora.');
      abrirModalPass(true);
    },800);
  }
}

function doLogout(){
  currentUser=null;
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('mainApp').classList.add('hidden');
  document.getElementById('loginUser').value='';
  document.getElementById('loginPass').value='';
  document.getElementById('loginAlert').innerHTML='';
}

function initApp(){
  document.getElementById('topbarUser').textContent=currentUser.nombre;
  document.getElementById('topbarBadge').textContent=currentUser.rol==='admin'?'Administrador':'Promotor';
  document.getElementById('topbarBadge').className='badge '+(currentUser.rol==='admin'?'badge-admin':'badge-promotor');
  document.getElementById('sidebarRole').textContent=currentUser.rol==='admin'?'ADMINISTRADOR':'PROMOTOR';
  buildNav();showPage('dashboard');
}

// ── NAV ───────────────────────────────────────────────────
const navAdmin=[
  {s:'Principal'},{id:'dashboard',label:'📊 Dashboard'},
  {s:'Operaciones'},{id:'imei',label:'🔍 Consulta IMEI'},{id:'ventas',label:'🛒 Ventas'},
  {id:'stock',label:'📦 Stock'},{id:'compras',label:'🚚 Compras'},
  {s:'Finanzas'},{id:'cuentas',label:'🏦 Cuentas'},{id:'proveedores',label:'🧾 Proveedores'},
  {id:'gastos',label:'💰 Gastos'},{id:'cierre',label:'📅 Cierre Diario'},
  {s:'Equipo'},{id:'cuotas',label:'🎯 Cuotas'},{id:'asistencia',label:'🕐 Asistencia'},
  {s:'Catálogo'},{id:'catalogo',label:'📋 Catálogo Precios'},
  {s:'Admin'},{id:'usuarios',label:'👥 Usuarios'},
];
const navPromotor=[
  {s:'Mi Panel'},{id:'dashboard',label:'📊 Mi Dashboard'},{id:'asistencia',label:'🕐 Mi Asistencia'},
  {s:'Operaciones'},{id:'imei',label:'🔍 Consulta IMEI'},{id:'ventas',label:'🛒 Registrar Venta'},
  {id:'stock',label:'📦 Ver Stock'},{id:'catalogo',label:'📋 Catálogo Precios'},
  {s:'Mi Meta'},{id:'cuotas',label:'🎯 Mis Cuotas'},
];

function buildNav(){
  const nav=currentUser.rol==='admin'?navAdmin:getNavPromotor();
  let html='';
  nav.forEach(n=>{
    if(n.s)html+=`<div class="nav-section">${n.s}</div>`;
    else html+=`<div class="nav-item" id="nav-${n.id}" onclick="showPage('${n.id}')">${n.label}</div>`;
  });
  document.getElementById('sideNav').innerHTML=html;
}

function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('page-'+id)?.classList.add('active');
  document.getElementById('nav-'+id)?.classList.add('active');
  const titles={dashboard:'Dashboard',stock:'Stock',imei:'Consulta IMEI',ventas:'Ventas',compras:'Compras',cuentas:'Cuentas Bancarias',proveedores:'Pagos Proveedores',gastos:'Gastos',cierre:'Cierre Diario',usuarios:'Usuarios',catalogo:'Catálogo de Precios',cuotas:'Cuotas de Ventas',asistencia:'Asistencia'};
  document.getElementById('topbarTitle').textContent=titles[id]||id;
  renderPage(id);
}

async function renderPage(id){
  const fns={dashboard:renderDashboard,stock:renderStock,imei:renderIMEI,ventas:renderVentas,compras:renderCompras,cuentas:renderCuentas,proveedores:renderProveedores,gastos:renderGastos,cierre:renderCierre,usuarios:renderUsuarios,catalogo:renderCatalogo,cuotas:renderCuotas,asistencia:renderAsistencia};
  if(fns[id])await fns[id]();
}

// ── MODAL CONTRASEÑA ──────────────────────────────────────
let passObligatorio=false;
function abrirModalPass(obligatorio=false){
  passObligatorio=obligatorio;
  document.getElementById('modalPass').classList.remove('hidden');
  document.getElementById('btnCerrarPass').style.display=obligatorio?'none':'';
  document.getElementById('mpPassActual').value='';
  document.getElementById('mpPassNueva').value='';
  document.getElementById('mpPassConfirm').value='';
  document.getElementById('modalPassAlert').innerHTML='';
}
function cerrarModalPass(){if(!passObligatorio)document.getElementById('modalPass').classList.add('hidden');}
async function confirmarCambioPass(){
  const actual=document.getElementById('mpPassActual').value;

  const confirm=document.getElementById('mpPassConfirm').value;
  if(!actual||!nueva){setAlert('modalPassAlert','warn','Completa todos los campos');return;}

  const btn=document.getElementById('btnCambiarPass');

}

async function guardarStock(){
  const imei=document.getElementById('sImei').value.trim();
  const precioC=document.getElementById('sPrecioC').value;
  const precioV=document.getElementById('sPrecioV').value;
  const proveedor=document.getElementById('sProveedor').value.trim();
  if(!imei||!precioC||!precioV||!proveedor){setAlert('stockAlert','warn','⚠ IMEI, precio compra, precio venta y proveedor son obligatorios');return;}
  const btn=document.getElementById('btnStock');btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Guardando...';
  const res=await api({accion:'getData',hoja:'stock'});const stock=res.data||[];
  if(stock.find(s=>s.imei===imei)){setAlert('stockAlert','danger','IMEI ya registrado');btn.disabled=false;btn.innerHTML='💾 Guardar en Sheets';return;}
  const nuevo={id:nextId(stock,'S'),tipo:document.getElementById('sType').value,marca:document.getElementById('sMarca').value,modelo:document.getElementById('sModelo').value,imei,color:document.getElementById('sColor').value,precioCompra:precioC,precioVenta:precioV,tipoStock:document.getElementById('sTipoStock').value,tipoDinero:document.getElementById('sTipoDinero').value,proveedor,cuentaProv:'',estadoPagoProveedor:document.getElementById('sEstadoPago').value,estado:'Disponible',fecha:today(),obs:document.getElementById('sObs').value};
  const r=await api({accion:'saveRecord',hoja:'stock',data:nuevo});
  btn.disabled=false;btn.innerHTML='💾 Guardar en Sheets';
  if(r.ok){setAlert('stockAlert','success','✓ Guardado en Google Sheets');setTimeout(()=>renderStock(),1500);}
  else setAlert('stockAlert','danger','Error: '+r.error);
}

  const movsRes=await api({accion:'getData',hoja:'movimientos'});const movs=movsRes.data||[];
  await api({accion:'saveRecord',hoja:'movimientos',data:{id:nextId(movs,'M'),fecha:today(),cuenta:banco,tipo:'Venta',monto:pv,ref:idVenta,resp:venta.asesor,obs:`${eq.marca} ${eq.modelo} — ${nombreCliente}`}});

function switchTab2(t){
  ['fijos','diarios','cats'].forEach(x=>{
    document.getElementById('tab'+x.charAt(0).toUpperCase()+x.slice(1)+'Btn').classList.toggle('active',x===t);
    document.getElementById('tab'+x.charAt(0).toUpperCase()+x.slice(1)+'2').classList.toggle('hidden',x!==t);
  });
}

async function crearCategoria(){
  const nombre=document.getElementById('nuevaCat').value.trim().toUpperCase();
  if(!nombre){setAlert('catAlert','warn','Ingresa el nombre');return;}
  const res=await api({accion:'getData',hoja:'categoriasGasto'});
  const cats=res.data||[];
  if(cats.find(c=>c.nombre===nombre)){setAlert('catAlert','warn','Ya existe esta categoría');return;}
  await api({accion:'saveRecord',hoja:'categoriasGasto',data:{id:nextId(cats,'CG'),nombre,activo:'1'}});
  setAlert('catAlert','success','✓ Categoría creada');setTimeout(()=>renderGastos(),1500);
}
